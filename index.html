<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Azure Tide Hotel | Oceanfront Luxury</title>
    <meta name="description" content="Experience coastal elegance at The Azure Tide Hotel. Located on the pristine shores of Northern Ireland, offering world-class luxury and serenity.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="StyleSheet.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <script src="header.js" defer></script>
    <script src="footer.js" defer></script>
</head>
<body>

    <site-header></site-header>

    <main>
         <!-- Carousel -->
    <section class="hero-carousel">
        <div class="carousel-container">
            
            <div class="slide active">
                <img src="beach-unsplash.png.jpg" alt="Sunny panoramic view of the private beach at The Azure Tide Hotel">
                <div class="hero-content">
                    <h2>Find your calm at the water's edge.</h2>
                    <p>Oceanfront luxury redefined.</p>
                    <a href="#rooms" class="btn-primary">Explore Suites</a>
                </div>
            </div>
                     <!-- Second Carousel Image -->
            <div class="slide">
                <img src="lobby-unsplash.png.jpg" alt="The elegant and spacious main lobby of The Azure Tide Hotel">
                <div class="hero-content">
                    <h2>Serenity in every wave.</h2>
                    <p>Relax by our world-class infinity pools.</p>
                </div>
            </div>
                    <!-- Third Carousel Image -->
            <div class="slide">
                <img src="room-unsplash.png.jpg" alt="Luxury oceanfront suite with a private balcony at The Azure Tide Hotel">
                <div class="hero-content">
                    <h2>Private sands await.</h2>
                    <p>Direct access to pristine coastal dunes.</p>
                </div>
            </div>
            
        </div> <button class="prev" onclick="changeSlide(-1)">&#10094;</button> 
        <button class="next" onclick="changeSlide(1)">&#10095;</button>
        
    </section> </main>
    <site-footer></site-footer>   

        <script src="js/CarouselScript.js"></script>
        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
</body>
</html>
