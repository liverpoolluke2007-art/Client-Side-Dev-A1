<!DOCTYPE html>
<html lang="en">

<head>
    <!--Page Heading-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking | The Azure Tide Hotel</title>
    <meta name="description" content="Discover the story behind The Azure Tide Hotel. From our coastal heritage to our commitment to luxury, learn what makes us Northern Ireland's premier destination.">
    <!-- Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/StyleSheet.css">

    <!-- Non-blocking Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet"></noscript>

    <script src="js/header.js" defer></script>
    <script src="js/footer.js" defer></script>
</head>

<body>

    <!--Site Header-->
    <site-header></site-header>

    <!--Booking Hero-->
    <section>
        <h1>Book a Room</h1>
    </section>

    <!--Booking Main-->
    <main>
        <p>This is a test</p>

<!-- Booking Section -->
  <section class="booking-section">
    <h2>Book Your Stay</h2>
    <form class="booking-form">
      <div class="form-group">
        <label for="adults">Adults</label>
        <input type="number" id="adults" name="adults" min="1" max="3" value="1" required>
      </div>

      <div class="form-group">
        <label for="rooms">Children</label>
        <input type="number" id="children" name="children" min="1" max="5" value="1" required>
      </div>
      
      <div class="form-group">
        <label for="checkin">Check-in</label>
        <input type="date" id="checkin" name="checkin" required>
      </div>

      <div class="form-group">
        <label for="checkout">Check-out</label>
        <input type="date" id="checkout" name="checkout" required>
      </div>

      <button type="submit">Check Availability</button>
    </form>
  </section>

  <style>
    .booking-section {
      padding: 60px 20px;
      text-align: center;
      background: #ffffff;
    }

    .booking-section h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #1e4f7a;
    }

    .booking-form {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    .form-group label {
      margin-bottom: 5px;
      font-weight: 600;
    }

    .form-group input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .booking-form button {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      background-color: #1e4f7a;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .booking-form button:hover {
      background-color: #163a59;
    }
  </style>

  <script>
    const checkin = document.getElementById('checkin');
    const checkout = document.getElementById('checkout');

    // Prevent selecting past dates
    const today = new Date().toISOString().split('T')[0];
    checkin.setAttribute('min', today);

    checkin.addEventListener('change', () => {
      checkout.value = '';
      checkout.setAttribute('min', checkin.value);
    });
  </script>

    <!--Site Footer-->
    <site-footer></site-footer>
</body>

</html>
